<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まゐのカードバトル！</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- タイトル画面（カードバトルトップ） -->
    <div id="title-screen">
        <!-- 💡 タイトル画面専用：ポータル（ホーム）へ戻るボタン -->
        <a href="../index.html" class="back-to-portal">
            <span class="back-icon">🏠</span>
            <span class="back-text">ホーム</span>
        </a>

        <div class="title-content">
            <h1 class="main-title">まゐの<br>カードバトル！</h1>
            <!-- ロゴ代わりにSランク画像を。images/S.png があれば表示されます -->
            <div class="title-logo-container">
                <img src="images/S.png" class="title-logo" onerror="this.style.display='none'">
            </div>
            <button id="start-btn" onclick="startGame()">GAME START</button>
        </div>
    </div>

    <!-- ゲーム本編エリア (対戦画面) -->
    <div id="game-main-area" style="display:none;">
        <!-- 💡 対戦画面専用：カードバトルトップへ戻るボタン（サイズ控えめ） -->
        <a href="./index.html" class="back-to-top">
            <span class="back-icon">↩️</span>
            <span class="back-text">トップ</span>
        </a>

        <h1>まゐのカードバトル！</h1>
        <button id="rule-btn" onclick="toggleRule()">ルール確認</button>

        <div id="character-area">
            <div class="char-box">
                <div id="p-effect-container" class="effect-container"></div>
                <img src="images/player.png" id="player-char" class="char-img">
                <p class="char-name">あなた</p>
            </div>
            <div id="center-ui">
                <div id="vs-icon">VS</div>
                <button id="reset-btn" onclick="initGame()">RETRY</button>
            </div>
            <div class="char-box">
                <div id="c-effect-container" class="effect-container"></div>
                <img src="images/cpu.png" id="cpu-char" class="char-img">
                <p class="char-name">対戦相手</p>
            </div>
        </div>

        <p id="game-info">準備中...</p>
        <p id="score-board">あなた: 0 | 相手: 0</p>
        <div id="result-text">カードを選んでね</div>
        <div id="special-msg" class="special-msg"></div>

        <div id="battle-field">
            <div class="card-slot"><div id="player-pushed" class="card empty"></div></div>
            <div class="card-slot"><div id="cpu-pushed" class="card empty"></div></div>
        </div>

        <div id="player-hand" class="card-deck"></div>
    </div>

    <!-- ルールモーダル -->
    <div id="rule-modal" class="modal">
        <div class="modal-content">
            <h2>対戦ルール</h2>
            <p>● S > A > B > C > D > E の順に強い</p>
            <p>● <strong>【例外】E は A に勝てる！</strong></p>
            <p>● 5枚の手札から3回勝負</p>
            <p>● Sランクの出現率は 5%</p>
            <button onclick="toggleRule()">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

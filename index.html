<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- ポータルサイトの index.html の head 内に追記 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#5c4033">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まゐゲームシリーズ</title>
    <!-- タイトルの下あたりに追加（最初は自動で隠れます） -->
    <button id="pwa-install-btn" style="display: none;">📱 アプリ版をインストール！</button>
    <style>
        /* 全体の設定：画面にぴったり収める */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 背景画像の設定 */
        body {
            background-image: url('./top.png');
            background-size: cover;
            background-position: center top; /* キャラクターの顔を中心に持ってくる */
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 上下に要素を分散 */
            align-items: center;
        }

        /* ゲームタイトル（上部に小さく配置してキャラを邪魔しない） */
        h1 {
            font-size: 1.6rem;
            margin: 20px 0 0 0;
            color: #5c4033;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-shadow: 1px 1px 0px #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ボタンを横並びにするコンテナ（画面最下部に固定） */
        .menu-container {
            width: 100%;
            max-width: 450px;
            padding-bottom: 30px; /* ナビゲーションバーとの被り防止 */
            box-sizing: border-box;
        }

        .menu-list {
            display: flex;
            justify-content: space-around; /* 3つのボタンを均等配置 */
            list-style: none;
            padding: 0 15px;
            margin: 0;
        }

        .menu-item {
            flex: 1;
            margin: 0 8px; /* ボタン同士の間隔 */
            max-width: 110px; /* ボタンの最大横幅 */
        }

        /* ソシャゲ風の正方形風ボタン */
        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1; /* 正方形を維持 */
            width: 100%;
            color: #5c4033;
            text-decoration: none;
            font-size: 0.85rem; /* スマホ用に文字を小さく調整 */
            font-weight: bold;
            border-radius: 18px; /* ほどよい角丸 */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(245, 235, 220, 0.95));
            border: 3px solid #fff;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15), inset 0 -4px 0 rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-sizing: border-box;
            padding: 5px;
        }

        /* ボタン内の絵文字（アイコン）を大きく表示 */
        .btn-icon {
            font-size: 2rem;
            margin-bottom: 4px;
        }

        /* ボタン内のテキスト折り返し設定 */
        .btn-text {
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
        }

        /* タップ・ホバー時の演出（ソシャゲのボタンっぽく凹む） */
        .btn:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 各ボタンのアクティブ・ホバー時のフチの色変化 */
        .btn-card:active { border-color: #e73c7e; color: #e73c7e; }
        .btn-pencil:active { border-color: #23a6d5; color: #23a6d5; }
        .btn-dice:active { border-color: #23d5ab; color: #23d5ab; }

        /* 全画面ロード画面（前回の仕様を維持） */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f7ebd3;
            background-image: url('./loading.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        #pwa-install-btn {
            display: inline-block;
            margin: 10px 0;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: 2px solid #fff;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

    </style>
</head>
<body>

    <!-- ゲームタイトル（上部） -->
    <h1>まゐゲームシリーズ</h1>

    <!-- ソシャゲ風下部メニュー -->
    <div class="menu-container">
        <ul class="menu-list">
            <li class="menu-item">
                <a data-href="./card/index.html" class="btn btn-card">
                    <span class="btn-icon">🃏</span>
                    <span class="btn-text">カード<br>バトル</span>
                </a>
            </li>
            <li class="menu-item">
                <a data-href="./pencil/index.html" class="btn btn-pencil">
                    <span class="btn-icon">✏️</span>
                    <span class="btn-text">鉛筆<br>バトル</span>
                </a>
            </li>
            <li class="menu-item">
                <a data-href="./dice/index.html" class="btn btn-dice">
                    <span class="btn-icon">🎲</span>
                    <span class="btn-text">サイコロ<br>バトル</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- ロード画面用レイヤー -->
    <div id="loading-overlay"></div>

    <script>
        const buttons = document.querySelectorAll('.btn');
        const overlay = document.getElementById('loading-overlay');

        buttons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const targetUrl = this.getAttribute('data-href');
                
                overlay.classList.add('active');
                
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 3000);
            });
        });
    </script>

    <!-- 既存のスクリプトの下あたりに追記 -->
    <script>
        // Service Worker の登録処理
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service Worker 登録成功！', reg.scope))
                    .catch((err) => console.log('Service Worker 登録失敗...', err));
            });
        }
        let deferredPrompt;
        
        const installBtn = document.getElementById('pwa-install-btn');

        // 【改良】ブラウザの気まぐれを待たず、最初からボタンを一瞬だけ強制表示してみる
        // PWA対応ブラウザ（Android Chromeなど）であれば、2秒後にボタンを強制出現させます
        setTimeout(() => {
            // すでにアプリとして起動している（standalone）場合を除き、ボタンを表示
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                installBtn.style.display = 'inline-block';
            }
        }, 2000);

        // ブラウザ側からインストールの準備完了通知が届いた時の処理
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // ブラウザ独自の勝手なポップアップを止める
            deferredPrompt = e;  // 実行権限（プロンプト）を保存
            installBtn.style.display = 'inline-block'; // ボタンを確実に表示
        });

        // ボタンが押された時の処理
        installBtn.addEventListener('click', async () => {
            // ブラウザの準備が整っている場合
            if (deferredPrompt) {
                deferredPrompt.prompt(); // 公式のインストール画面を出す
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                }
                deferredPrompt = null;
            } else {
                // 【追加】まだブラウザの準備ができていないタイミングで押された場合
                // ユーザーに手動でのインストール手順を優しくガイドする
                alert('画面右上のメニュー（縦の「…」）をタップし、「アプリをインストール」または「ホーム画面に追加」を選んでください！');
            }
        });

        // インストール完了後はボタンを消す
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            deferredPrompt = null;
        });
    </script>
</body>
</html>

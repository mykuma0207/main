<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME PORTAL</title>
    <style>
        /* 背景の動くグラデーション */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* メインコンテナ */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            margin: 20px 0;
        }

        .btn {
            display: block;
            padding: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .btn:hover {
            background: #fff;
            transform: translateY(-4px);
        }

        .btn-card:hover {
            color: #e73c7e;
            box-shadow: 0 8px 25px rgba(231, 60, 126, 0.6);
        }

        .btn-pencil:hover {
            color: #23a6d5;
            box-shadow: 0 8px 25px rgba(35, 166, 213, 0.6);
        }

        .btn-dice:hover {
            color: #23d5ab;
            box-shadow: 0 8px 25px rgba(35, 213, 171, 0.6);
        }

        /* 【追加】全画面ロード画面のスタイル */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f7ebd3; /* 画像になじむ背景色 */
            background-image: url('./loading.png'); /* 保存した画像名に合わせて変更してください */
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain; /* 画面に収まるように全体を表示 */
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* ロード画面を表示する時のクラス */
        #loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- ポータル画面 -->
    <div class="container">
        <h1>まゐゲームシリーズ</h1>
        <ul class="menu-list">
            <li class="menu-item">
                <a data-href="./card/index.html" class="btn btn-card">🃏 まゐのカードバトル！</a>
            </li>
            <li class="menu-item">
                <a data-href="./pencil/index.html" class="btn btn-pencil">✏️ まゐの鉛筆バトル！</a>
            </li>
            <li class="menu-item">
                <a data-href="./dice/index.html" class="btn btn-dice">🎲 まゐのサイコロバトル！</a>
            </li>
        </ul>
    </div>

    <!-- 【追加】ロード画面用レイヤー -->
    <div id="loading-overlay"></div>

    <script>
        // 全てのボタンを取得
        const buttons = document.querySelectorAll('.btn');
        const overlay = document.getElementById('loading-overlay');

        buttons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault(); // すぐのページ遷移をストップ
                
                const targetUrl = this.getAttribute('data-href'); // 行き先を取得
                
                // ロード画面を表示
                overlay.classList.add('active');
                
                // 3000ミリ秒（3秒）後にページを切り替え
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 3000);
            });
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まゐゲームシリーズ</title>
    <!-- 共通PWAマニフェストの読み込み -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#5c4033">
    
    <style>
        /* 全体の設定：画面にぴったり収める */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 背景画像の設定 */
        body {
            background-image: url('./top.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* ゲームタイトル */
        h1 {
            font-size: 1.6rem;
            margin: 20px 0 0 0;
            color: #5c4033;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-shadow: 1px 1px 0px #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* PWAインストールボタン（未インストール時のみ上にふわっと出る） */
        #pwa-install-btn {
            display: none; /* 条件を満たすまで最初は隠す */
            margin-top: 15px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border: 2px solid #fff;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            animation: pulse 2s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* ボタンを横並びにするコンテナ（画面最下部に固定） */
        .menu-container {
            width: 100%;
            max-width: 450px;
            padding-bottom: 30px;
            box-sizing: border-box;
        }

        .menu-list {
            display: flex;
            justify-content: space-around;
            list-style: none;
            padding: 0 15px;
            margin: 0;
        }

        .menu-item {
            flex: 1;
            margin: 0 8px;
            max-width: 110px;
        }

        /* ソシャゲ風の正方形風ボタン */
        .btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1;
            width: 100%;
            color: #5c4033;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(245, 235, 220, 0.95));
            border: 3px solid #fff;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15), inset 0 -4px 0 rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-sizing: border-box;
            padding: 5px;
        }

        .btn-icon {
            font-size: 2rem;
            margin-bottom: 4px;
        }

        .btn-text {
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
        }

        /* タップ時の沈み込み演出 */
        .btn:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-card:active { border-color: #e73c7e; color: #e73c7e; }
        .btn-pencil:active { border-color: #23a6d5; color: #23a6d5; }
        .btn-dice:active { border-color: #23d5ab; color: #23d5ab; }

        /* 全画面ロード画面（3秒挟む用） */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #f7ebd3;
            background-image: url('./loading.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- 上部タイトルとインストールボタン -->
    <div style="text-align: center;">
        <h1>まゐゲームシリーズ</h1>
        <button id="pwa-install-btn">📱 アプリ版をインストール！</button>
    </div>

    <!-- ソシャゲ風下部メニュー -->
    <div class="menu-container">
        <ul class="menu-list">
            <li class="menu-item">
                <a data-href="./card/index.html" class="btn btn-card">
                    <span class="btn-icon">🃏</span>
                    <span class="btn-text">カード<br>バトル</span>
                </a>
            </li>
            <li class="menu-item">
                <a data-href="./pencil/index.html" class="btn btn-pencil">
                    <span class="btn-icon">✏️</span>
                    <span class="btn-text">鉛筆<br>バトル</span>
                </a>
            </li>
            <li class="menu-item">
                <a data-href="./dice/index.html" class="btn btn-dice">
                    <span class="btn-icon">🎲</span>
                    <span class="btn-text">サイコロ<br>バトル</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- ロード画面用レイヤー -->
    <div id="loading-overlay"></div>

    <script>
        // --- 1. 3秒のページ遷移ロード処理 ---
        const buttons = document.querySelectorAll('.btn');
        const overlay = document.getElementById('loading-overlay');

        buttons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const targetUrl = this.getAttribute('data-href');
                overlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 3000);
            });
        });

        // --- 2. PWA自動インストールボタン処理 ---
        let deferredPrompt = null;
        const installBtn = document.getElementById('pwa-install-btn');

        // アプリ版（standalone）で起動中なら最初から絶対にボタンを出さない
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
            installBtn.style.display = 'none';
        } else {
            // 全て小文字の「service-worker.js」を正確に登録
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./service-worker.js')
                        .then((reg) => console.log('SW登録成功', reg.scope))
                        .catch((err) => console.log('SW登録失敗', err));
                });
            }

            // ブラウザがインストール可能と判断した時にボタンを出現させる
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.style.display = 'inline-block'; // ここで初めて綺麗に出現
            });
        }

        // ボタンクリックで公式プロンプト起動
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.style.display = 'none';
                    deferredPrompt = null;
                }
            }
        });

        // インストール完了後にボタンを即座に消滅させる
        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
            deferredPrompt = null;
        });
    </script>

</body>
</html>
